version: 2
registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.GH_TOKEN }}
  git-github:
    type: git
    url: https://github.com
    username: x-access-token
    password: '${{ secrets.GH_TOKEN }}'
updates:
  - package-ecosystem: npm
    schedule:
      interval: weekly
      day: monday
    groups:
      dependencies:
        patterns:
          - "*"
    directories:
      - "/"
    commit-message:
      prefix: fix(dependabot)
    registries:
      - npm-github
      - git-github
    cooldown:
      default-days: 7
      exclude:
        - '@typeform/*'
    ignore:
      - dependency-name: semantic-release
        versions:
          - '>=25.0.0'
  - package-ecosystem: github-actions
    schedule:
      interval: weekly
      day: monday
    groups:
      dependencies:
        patterns:
          - "*"
    directory: "/"
    commit-message:
      prefix: build(dependabot)
